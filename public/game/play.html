<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>プレイ中 — MIN-Tube-Pro Games</title>
  <style>
  :root{
      --bg1:#0f1724;
      --bg2:#071029;
      --accent:#00d4ff;
      --glass:rgba(7, 16, 41, 0.8);
      --card:rgba(255,255,255,0.03);
      --glass-border:rgba(255,255,255,0.1);
      --radius:14px;
      --glass-blur:12px;
      --text:#e6f7ff;
      --muted:#9fb7c9;
      --topbar-height: 54px; /* スリム化 */
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      height:100%;
      font-family:Inter,"Noto Sans JP",system-ui,-apple-system,sans-serif;
      background:#000;
      color:var(--text);
      overflow:hidden;
    }

    /* レイアウトを重ね合わせに変更 */
    .layout{
      position: relative;
      height: 100vh;
      width: 100vw;
    }

    /* 
      トップバーをオーバーレイ化 & 自動隠し
    */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--topbar-height);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 15px;
      background: var(--glass);
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--glass-blur));
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateY(-90%); /* 普段は少しだけ見える状態、または-100%で完全に隠す */
    }
    
    /* マウスを近づけると表示 */
    .topbar:hover, .topbar.active {
      transform: translateY(0);
    }

    /* バーが隠れている時の「つまみ」のような役割 */
    .topbar::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 4px;
      background: var(--accent);
      border-radius: 2px;
      opacity: 0.3;
      transition: opacity 0.3s;
    }
    .topbar:hover::after { opacity: 0; }

    .back-btn{
      display: inline-flex; align-items: center; gap: 4px;
      color: var(--muted); font-size: 12px; text-decoration: none;
      padding: 5px 10px; border-radius: 6px;
      border: 1px solid var(--glass-border);
      background: var(--card);
      transition: all .18s;
    }
    .back-btn:hover{color:var(--accent);background:rgba(0,212,255,0.07)}
    .back-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}

    .divider{width:1px;height:20px;background:var(--glass-border)}

    .game-info{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
    .game-emoji{font-size:18px}
    .game-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .live-badge{
      display:flex;align-items:center;gap:5px;
      padding:3px 8px;border-radius:12px;
      background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);
      font-size:10px;color:#4ade80;font-weight:700;
    }
    .live-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;position:relative}

    .action-btn{
      display:inline-flex;align-items:center;justify-content:center;gap:4px;
      padding:5px 10px;border-radius:6px;border:1px solid var(--glass-border);
      background:var(--card);color:var(--muted);font-size:11px;cursor:pointer;
      transition:all .18s;
    }
    .action-btn:hover{color:var(--text);background:rgba(255,255,255,0.06)}
    .action-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

    /* ゲームエリアを全画面に */
    .frame-wrap{
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:#000;
    }
    iframe#gameFrame{width:100%;height:100%;border:none;display:block;}

    /* ローディングとエラーも全画面 */
    .loading, .error-screen {
      position:absolute;inset:0;z-index:20;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:var(--bg2);
    }
    .loading.hidden{display:none}
    .spinner{width:40px;height:40px;border:3px solid rgba(0,212,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* サイドパネル調整 */
    .side-toggle{
      position:fixed;right:0;top:60px; /* トップバーと被らない位置 */
      width:24px;height:50px;
      background:var(--glass);backdrop-filter:blur(8px);
      border:1px solid var(--glass-border);border-right:none;
      border-radius:8px 0 0 8px;display:flex;align-items:center;justify-content:center;
      cursor:pointer;z-index:100;
    }
    
    @media(max-width:600px){
      .action-btn span, .back-btn span {display:none} /* モバイルではアイコンのみ */
      .game-info {gap:5px}
    }
  </style>
</head>

<body>
  <div class="layout" id="layout">
    <!-- トップバー（自動隠し） -->
    <div class="topbar" id="topbar">
      <a href="game.html" class="back-btn">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        <span>一覧</span>
      </a>
      <div class="divider"></div>
      <div class="game-info">
        <span class="game-emoji" id="gameEmoji">🎮</span>
        <div class="game-name" id="gameName">読み込み中…</div>
        <div class="live-badge" id="liveBadge" style="display:none">
          <div class="live-dot"></div><span>LIVE</span>
        </div>
      </div>
      
      <button class="action-btn" id="reloadBtn" title="リロード">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span>リロード</span>
      </button>
      <button class="action-btn" id="fsBtn" title="フルスクリーン">
        <svg viewBox="0 0 24 24" id="fsIcon"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        <span>全画面</span>
      </button>
    </div>

    <!-- ゲーム本体（100%表示） -->
    <div class="frame-wrap" id="frameWrap">
      <div class="loading" id="loadingScreen">
        <div class="spinner"></div>
      </div>
      <div class="error-screen" id="errorScreen" style="display:none">
        <div style="font-size:40px">⚠️</div>
        <div id="errorMsg">読み込めませんでした</div>
        <button onclick="location.reload()" class="action-btn" style="margin-top:20px;padding:10px 20px">再読み込み</button>
      </div>
      <iframe id="gameFrame" allowfullscreen></iframe>
    </div>
  </div>

  <div class="side-toggle" id="sideToggle">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9fb7c9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  </div>

  <div class="side-panel" id="sidePanel" style="display:none">
    <!-- 内容はJavaScriptで挿入 -->
  </div>

  <script>
  const params = new URLSearchParams(location.search);
  const gameKey = params.get('game') || '';
  const frame = document.getElementById('gameFrame');
  const loading = document.getElementById('loadingScreen');
  const topbar = document.getElementById('topbar');

  // 一定時間でトップバーを隠す（タッチデバイス用）
  let topbarTimeout;
  function showTopbarTemporarily() {
    topbar.classList.add('active');
    clearTimeout(topbarTimeout);
    topbarTimeout = setTimeout(() => {
      topbar.classList.remove('active');
    }, 3000);
  }
  document.addEventListener('mousemove', (e) => {
    if (e.clientY < 60) topbar.classList.add('active');
    else topbar.classList.remove('active');
  });
  document.addEventListener('touchstart', showTopbarTemporarily);

  async function loadGame() {
    try {
      const res = await fetch('games.json');
      const games = await res.json();
      const game = games.find(g => g.key === gameKey);

      if (!game) {
        document.getElementById('errorScreen').style.display = 'flex';
        return;
      }

      document.title = `${game.name} — Play`;
      document.getElementById('gameName').textContent = game.name;
      document.getElementById('gameEmoji').textContent = game.emoji;
      
      frame.onload = () => {
        loading.classList.add('hidden');
        document.getElementById('liveBadge').style.display = 'flex';
      };
      frame.src = game.file;
    } catch (err) {
      console.error(err);
    }
  }

  document.getElementById('reloadBtn').onclick = () => {
    loading.classList.remove('hidden');
    frame.src = frame.src;
  };

  document.getElementById('fsBtn').onclick = () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  };

  loadGame();
  </script>
</body>
</html>
