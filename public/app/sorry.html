<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ページ準備中</title>
<style>
  :root{
    --bg:#0b0f1a;
    --accent:#6ee7ff;
    --glass-bg: rgba(255,255,255,0.06);
    --text:#e6f7ff;
    --muted: rgba(230,247,255,0.75);
  }
  html,body{height:100%;margin:0;font-family:Inter, "Noto Sans JP", system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;}
  #wrap{position:relative;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  canvas{display:block;position:absolute;inset:0;width:100%;height:100%;z-index:0}
  .center{
    position:relative;z-index:5;max-width:92ch;padding:28px 36px;border-radius:14px;
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
    box-shadow: 0 8px 30px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
    backdrop-filter: blur(8px) saturate(120%);
    -webkit-backdrop-filter: blur(8px) saturate(120%);
    border:1px solid rgba(255,255,255,0.04);
    text-align:center;
    transform: translateZ(40px);
  }
  h1{
    margin:0 0 8px 0;font-size:clamp(20px,4.6vw,36px);letter-spacing:0.02em;
    color:var(--text);font-weight:700;
    text-shadow: 0 6px 30px rgba(0,0,0,0.6);
  }
  p.lead{
    margin:0;color:var(--muted);font-size:clamp(13px,1.8vw,16px);
  }
  .sub{
    margin-top:12px;font-size:13px;color:rgba(230,247,255,0.55);
  }

  .glow{
    display:inline-block;margin-top:14px;height:6px;width:120px;border-radius:999px;
    background:linear-gradient(90deg,var(--accent), rgba(110,231,255,0.25));
    filter:blur(8px);opacity:0.95;
    animation: pulse 2.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%{transform:translateY(0) scaleX(0.9);opacity:0.7}
    50%{transform:translateY(-6px) scaleX(1.05);opacity:1}
    100%{transform:translateY(0) scaleX(0.9);opacity:0.7}
  }

  .note{margin-top:14px;font-size:12px;color:rgba(230,247,255,0.45)}

  a:focus, button:focus {outline:3px solid rgba(110,231,255,0.18);outline-offset:3px}

  @media (prefers-reduced-motion: reduce){
    .glow, canvas {animation:none;transition:none}
  }

  @media (max-width:520px){
    .center{padding:20px 18px;border-radius:12px}
  }
</style>
</head>
<body>
<div id="wrap" role="main" aria-labelledby="title">
  <canvas id="bg"></canvas>

  <div class="center" aria-live="polite">
    <h1 id="title">まだこのページは完成していません。。。</h1>
    <p class="lead">準備中のため、しばらくお待ちください。アップデート確認から最新バージョンを入手してください。</p>
    <div class="glow" aria-hidden="true"></div>
    <div class="note">このページは代理として作成されました。</div>
  </div>
</div>

<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>

<script>

(() => {
  const canvas = document.getElementById('bg');
  const renderer = new THREE.WebGLRenderer({canvas, antialias: true, alpha: true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 6);

  const hemi = new THREE.HemisphereLight(0x99d6ff, 0x0b1220, 0.6);
  scene.add(hemi);
  const pLight = new THREE.PointLight(0x6ee7ff, 1.2, 20);
  pLight.position.set(5, 5, 5);
  scene.add(pLight);

  const detail = 64; 
  const geometry = new THREE.IcosahedronGeometry(1.6, 5);
  const material = new THREE.MeshStandardMaterial({
    color: 0x0ff6ff,
    metalness: 0.15,
    roughness: 0.35,
    emissive: 0x003344,
    emissiveIntensity: 0.6,
    flatShading: false,
    transparent: true,
    opacity: 0.98
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.scale.set(1.05,1.05,1.05);
  scene.add(mesh);

  // パーティクル群
  const particlesCount = 800;
  const pGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(particlesCount * 3);
  const sizes = new Float32Array(particlesCount);
  for (let i = 0; i < particlesCount; i++) {
    const r = 2.6 + Math.random() * 3.6;
    const theta = Math.random() * Math.PI * 2;
    const phi = (Math.random() - 0.5) * Math.PI;
    positions[i*3] = Math.cos(theta) * Math.cos(phi) * r;
    positions[i*3+1] = Math.sin(phi) * r * 0.6;
    positions[i*3+2] = Math.sin(theta) * Math.cos(phi) * r;
    sizes[i] = 1 + Math.random() * 2.2;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  pGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  const pMat = new THREE.PointsMaterial({
    color: 0x9ff7ff,
    size: 0.06,
    transparent: true,
    opacity: 0.9,
    depthWrite: false
  });
  const points = new THREE.Points(pGeo, pMat);
  scene.add(points);

  const basePositions = new Float32Array(geometry.attributes.position.array.length);
  basePositions.set(geometry.attributes.position.array);

  let clock = new THREE.Clock();
  let reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function animate() {
    const t = clock.getElapsedTime();

    const pos = geometry.attributes.position.array;
    for (let i = 0; i < pos.length; i += 3) {
      const ix = i;
      const iy = i + 1;
      const iz = i + 2;
      const bx = basePositions[ix];
      const by = basePositions[iy];
      const bz = basePositions[iz];
      const n = 0.12 * Math.sin(t * 1.2 + bx * 2.5 + by * 1.7) + 0.08 * Math.cos(t * 1.7 + bz * 2.1);
      pos[ix] = bx + bx * n;
      pos[iy] = by + by * n;
      pos[iz] = bz + bz * n;
    }
    geometry.attributes.position.needsUpdate = true;
    geometry.computeVertexNormals();

    if (!reducedMotion) {
      mesh.rotation.y += 0.0035;
      mesh.rotation.x = Math.sin(t * 0.2) * 0.08;
      points.rotation.y -= 0.0009;
    }

    const pPos = pGeo.attributes.position.array;
    for (let i = 0; i < pPos.length; i += 3) {
      pPos[i+1] += Math.sin(t * 0.6 + i) * 0.0004;
    }
    pGeo.attributes.position.needsUpdate = true;

    camera.position.x = Math.sin(t * 0.12) * 0.12;
    camera.position.y = Math.sin(t * 0.07) * 0.08;
    camera.lookAt(0,0,0);

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }

  function onResize(){
    const w = window.innerWidth;
    const h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', onResize, {passive:true});

  let mouseX = 0, mouseY = 0;
  function onMove(e){
    const x = (e.clientX / window.innerWidth) * 2 - 1;
    const y = (e.clientY / window.innerHeight) * 2 - 1;
    mouseX = x; mouseY = y;
    camera.position.x += (mouseX * 0.6 - camera.position.x) * 0.06;
    camera.position.y += (-mouseY * 0.4 - camera.position.y) * 0.06;
  }
  window.addEventListener('mousemove', onMove, {passive:true});

  let lastTouch = null;
  window.addEventListener('touchmove', (ev) => {
    if (ev.touches && ev.touches[0]) {
      const t = ev.touches[0];
      onMove({clientX: t.clientX, clientY: t.clientY});
      lastTouch = Date.now();
    }
  }, {passive:true});

  onResize();
  setTimeout(() => {
    clock.start();
    animate();
  }, 80);

  let fpsSamples = [];
  let lastFrame = performance.now();
  function fpsCheck(){
    const now = performance.now();
    const dt = now - lastFrame;
    lastFrame = now;
    const fps = 1000 / dt;
    fpsSamples.push(fps);
    if (fpsSamples.length > 30) fpsSamples.shift();
    const avg = fpsSamples.reduce((a,b)=>a+b,0)/fpsSamples.length;
    if (avg < 30) {
      reducedMotion = true;
      pMat.size = 0.04;
      renderer.setPixelRatio(1);
    }
    requestAnimationFrame(fpsCheck);
  }
  fpsCheck();

})();
</script>
</body>
</html>
